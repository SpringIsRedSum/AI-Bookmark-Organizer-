<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; width: 320px; padding: 15px; color: #333; }
    h3 { margin-top: 0; font-size: 16px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
    label { font-size: 12px; color: #666; }
    input[type="password"] { width: 100%; padding: 8px; margin: 8px 0; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    button { width: 100%; padding: 10px; margin-top: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
    #saveBtn { background-color: #f0f0f0; color: #333; }
    #saveBtn:hover { background-color: #e0e0e0; }
    #backupBtn { background-color: #4CAF50; color: white; }
    #backupBtn:hover { background-color: #45a049; }
    #organizeBtn { background-color: #0078D7; color: white; }
    #organizeBtn:hover { background-color: #0063b1; }
    #status { margin-top: 12px; font-size: 12px; color: #d93025; text-align: center; min-height: 18px; }
  </style>
</head>
<body>
  <h3>🚀 AI 书签整理 (DeepSeek)</h3>
  
  <label for="apiKey">DeepSeek API Key:</label>
  <input type="password" id="apiKey" placeholder="sk-xxxxxxxxxxxxxxxxxxx">
  <button id="saveBtn">保存 API Key</button>

  <hr style="border: 0; border-top: 1px dashed #eee; margin: 15px 0;">

  <button id="backupBtn">1. 备份当前书签 (必做!)</button>
  <button id="organizeBtn">2. 一键 AI 智能分类整理</button>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
